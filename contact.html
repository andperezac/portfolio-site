<body>
    <header class="header">
        <a href="#" class="logo">Andrea.</a>
        
        <nav class="navbar">
            <a href="index.html" class="active">Home</a>

        </nav>
    </header>


    <div class="contact-container">
        <form action="" class="conact-center" id="contactForm">
            <div class="contact-center-title">
                <h2>Let's Chat!</h2>
           
            </div>
            
            <br>
            <label for="Name">Full Name</label>
            <input type="text" name="name" class="contact-inputs" required>
            
            <br>
            <label for="email">Email</label>
            <input type="email" name="email" class="contact-inputs" required>
            
            <br>
            <label for="message">Message Details</label>
            <textarea name="message" class="contact-inputs" required></textarea>
            
            <br>
            <button type="button" onclick="submitForm()">Submit</button>
            
        </form>
    </div>
  
    
    </section>
